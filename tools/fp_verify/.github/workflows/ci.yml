name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest build twine

      - name: Run tests
        run: pytest -q

      - name: Verify example bundles
        run: |
          fp-verify verify examples/happy_path_payment_release/bundle.json
          fp-verify verify examples/rogue_wire_transfer_bundle/bundle.json
          fp-verify verify examples/break_glass_without_incident/bundle.json
          fp-verify verify examples/ambiguous_provider_result/bundle.json

      - name: Build distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*
